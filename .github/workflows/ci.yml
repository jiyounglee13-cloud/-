name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate knowledge base (판례 무결성)
        run: npm run validate:kb

      - name: RAG retrieval regression test
        run: npm run test:rag

      - name: PII scrubbing test
        run: npm run test:scrub

      - name: Crawler HTTP integration test (robots + mock)
        run: npm run test:crawler

      - name: ANN (LSH) recall test
        run: npm run test:ann

      - name: Qdrant backend integration test (mock REST)
        run: npm run test:qdrant

      - name: Eval harness self-test (rubric)
        run: npm run test:eval

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # 빌드는 API 키 없이 통과해야 함(런타임에만 필요)
          ANTHROPIC_API_KEY: ""
